<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>斗地主 - 测试</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 { margin-bottom: 20px; }
    .btn {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: white;
    }
    .loader {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .room-code {
      font-size: 32px;
      font-weight: bold;
      color: #ffd700;
      margin: 15px 0;
    }
    .error {
      background: rgba(248,113,113,0.3);
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 斗地主测试</h1>
    
    <button class="btn" onclick="test()">🧪 测试连接</button>
    
    <div id="result" style="display:none; margin-top:20px;">
      <div class="loader"></div>
      <p>测试中...</p>
    </div>
    
    <div id="success" style="display:none; margin-top:20px;">
      <div style="background:rgba(74,222,128,0.3);padding:20px;border-radius:10px;">
        <p style="font-size:24px;">✅ 成功！</p>
        <p class="room-code" id="room-code"></p>
        <p>玩家：<span id="player-count"></span>/3</p>
      </div>
    </div>
    
    <div id="error" style="display:none; margin-top:20px;">
      <div class="error">
        <p>❌ 失败</p>
        <p id="error-msg" style="margin-top:10px;font-size:14px;"></p>
      </div>
    </div>
  </div>
  
  <script>
    const API = 'https://period-zip-homepage-purchased.trycloudflare.com/api/bot-game';
    
    async function test() {
      document.getElementById('result').style.display = 'block';
      document.getElementById('success').style.display = 'none';
      document.getElementById('error').style.display = 'none';
      
      try {
        console.log('开始测试 API 连接...');
        const response = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'create_multiplayer_room',
            user: { id: 1957922236, username: '测试用户' }
          })
        });
        
        console.log('HTTP 状态:', response.status);
        const result = await response.json();
        console.log('响应结果:', result);
        
        if (result.success) {
          document.getElementById('result').style.display = 'none';
          document.getElementById('success').style.display = 'block';
          document.getElementById('room-code').textContent = result.roomId;
          document.getElementById('player-count').textContent = result.player_count;
        } else {
          showError(result.error || 'API 返回失败');
        }
      } catch (error) {
        console.error('测试失败:', error);
        showError(error.message || '未知错误');
      }
    }
    
    function showError(msg) {
      document.getElementById('result').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error-msg').textContent = msg;
    }
  </script>
</body>
</html>
