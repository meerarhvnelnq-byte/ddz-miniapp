<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>斗地主</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .container {
      text-align: center;
      padding: 20px;
      width: 100%;
      max-width: 400px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .user-info {
      background: rgba(255,255,255,0.2);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    .username {
      font-size: 18px;
      font-weight: bold;
    }
    .score {
      font-size: 24px;
      margin-top: 5px;
      color: #ffd700;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-primary {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
    }
    .btn-success {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
    }
    .btn-warning {
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      color: white;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.3);
      color: white;
    }
    .loading {
      font-size: 18px;
      padding: 20px;
    }
    .spinner {
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p style="margin-top: 15px;">加载中...</p>
    </div>
  </div>

  <script>
    let currentUserId = '';
    
    // 初始化
    window.addEventListener('DOMContentLoaded', () => {
      console.log('🎮 Mini App 启动');
      
      const tg = window.Telegram.WebApp;
      
      // 告诉 Telegram 已准备好
      tg.ready();
      tg.expand();
      
      // 获取用户信息
      const user = tg.initDataUnsafe?.user || {};
      currentUserId = user.id || 'unknown';
      
      console.log('👤 用户:', user);
      
      // 渲染大厅
      renderLobby(user);
      
      // 监听 Bot 返回的消息
      tg.onEvent('mainButtonClicked', () => {
        console.log('主按钮点击');
      });
    });
    
    // 监听来自 Bot 的消息
    // Telegram WebApp 通过主应用发送数据回来
    Telegram.WebApp.onEvent('mainButtonClicked', function() {
      console.log('主按钮点击');
    });
    
    // 接收 Bot 通过 web_app_data 返回的数据
    // 由于 Telegram 限制，我们需要通过 URL 参数或其他方式接收
    // 这里我们直接显示本地数据
    
    // 模拟积分数据（实际应该从 Bot 获取）
    window.userScore = 100;
    window.userRank = '黑铁';
    
    function renderLobby(user) {
      const app = document.getElementById('app');
      const username = user.username || user.first_name || '玩家';
      const userId = user.id || 'unknown';
      
      app.innerHTML = `
        <div class="container">
          <h1>🎮 斗地主</h1>
          
          <div class="user-info">
            <div class="username">@${username}</div>
            <div class="score" id="score">加载中...</div>
          </div>
          
          <button class="btn btn-primary" onclick="createRoom()">
            🏠 创建房间
          </button>
          
          <button class="btn btn-success" onclick="joinRoom()">
            🚪 加入房间
          </button>
          
          <button class="btn btn-warning" onclick="viewScore()">
            📊 积分榜
          </button>
          
          <button class="btn btn-secondary" onclick="dailyClaim()">
            📅 每日签到
          </button>
        </div>
      `;
      
      // 加载积分
      loadScore(userId);
    }
    
    function loadScore(userId) {
      // 简单模拟积分显示
      const scoreEl = document.getElementById('score');
      if (scoreEl) {
        // 从 Telegram 发送数据到 bot
        Telegram.WebApp.sendData(JSON.stringify({
          action: 'get_score',
          user_id: userId
        }));
        
        // 显示默认积分
        scoreEl.textContent = '100 分';
      }
    }
    
    function createRoom() {
      Telegram.WebApp.sendData(JSON.stringify({
        action: 'create_room'
      }));
      alert('创建房间功能开发中...');
    }
    
    function joinRoom() {
      const code = prompt('请输入房间号:');
      if (code) {
        Telegram.WebApp.sendData(JSON.stringify({
          action: 'join_room',
          room_code: code
        }));
        alert('加入房间功能开发中...');
      }
    }
    
    function viewScore() {
      // 直接显示积分（从本地存储或默认值）
      const score = window.userScore || 100;
      const rank = window.userRank || '黑铁';
      
      Telegram.WebApp.showPopup({
        title: '积分榜',
        message: `当前积分：${score}分\n段位：${rank}`
      });
    }
    
    function dailyClaim() {
      // 直接更新本地积分
      window.userScore = (window.userScore || 100) + 10;
      
      // 更新显示
      const scoreEl = document.getElementById('score');
      if (scoreEl) {
        scoreEl.textContent = `${window.userScore}分`;
      }
      
      Telegram.WebApp.showPopup({
        title: '签到成功',
        message: `✅ 获得 10 分\n当前积分：${window.userScore}分`
      });
    }
    
    // 处理 Bot 返回的响应
    function handleBotResponse(data) {
      console.log('📩 Bot 响应:', data);
      
      if (data.type === 'score') {
        const scoreEl = document.getElementById('score');
        if (scoreEl) {
          scoreEl.textContent = `${data.score}分 (${data.rank})`;
        }
        Telegram.WebApp.showPopup({
          title: '积分榜',
          message: `当前积分：${data.score}分\n段位：${data.rank}`
        });
      } else if (data.type === 'daily_claim') {
        const scoreEl = document.getElementById('score');
        if (scoreEl) {
          scoreEl.textContent = `${data.new_score}分`;
        }
        Telegram.WebApp.showPopup({
          title: '签到成功',
          message: `✅ 获得 ${data.reward}分\n当前积分：${data.new_score}分`
        });
      } else if (data.type === 'error') {
        Telegram.WebApp.showPopup({
          title: '错误',
          message: data.message
        });
      }
    }
  </script>
</body>
</html>
