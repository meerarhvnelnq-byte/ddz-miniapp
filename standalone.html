<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>斗地主多人对战</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 { margin-bottom: 30px; }
    .btn {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }
    .room-info {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
    }
    .room-code {
      font-size: 32px;
      font-weight: bold;
      color: #ffd700;
      letter-spacing: 5px;
      margin: 10px 0;
    }
    .status { font-size: 14px; color: rgba(255,255,255,0.8); }
    .loader {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error {
      background: rgba(248,113,113,0.3);
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 斗地主多人对战</h1>
    
    <div id="lobby">
      <button class="btn btn-primary" onclick="createRoom()">
        🏠 创建房间
      </button>
      
      <button class="btn btn-success" onclick="showJoinRoom()">
        🚪 加入房间
      </button>
    </div>
    
    <div id="loading" style="display:none;">
      <div class="loader"></div>
      <p>正在创建房间...</p>
    </div>
    
    <div id="create-room" style="display:none;">
      <div class="room-info">
        <p>房间号</p>
        <div class="room-code" id="room-code">----</div>
        <p class="status" id="room-status">等待玩家加入... 1/3</p>
      </div>
      
      <button class="btn btn-success" onclick="shareRoom()">
        📤 分享房间
      </button>
    </div>
    
    <div id="join-room" style="display:none;">
      <input type="text" id="join-code" maxlength="6" placeholder="输入 6 位房间号" 
             style="width:100%;padding:15px;font-size:20px;text-align:center;letter-spacing:3px;border:2px solid rgba(255,255,255,0.3);border-radius:10px;background:rgba(0,0,0,0.3);color:white;margin:20px 0;" />
      
      <button class="btn btn-success" onclick="joinRoom()">
        🚪 加入房间
      </button>
    </div>
    
    <div id="error" style="display:none;">
      <div class="error">
        <p>❌ 连接失败</p>
        <p id="error-msg" style="margin-top:10px;font-size:14px;"></p>
      </div>
      
      <button class="btn btn-primary" onclick="location.reload()">
        🔄 重试
      </button>
    </div>
  </div>
  
  <script>
    // API 地址（硬编码最新版本）
    const API_ENDPOINT = 'https://period-zip-homepage-purchased.trycloudflare.com/api/bot-game';
    
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    const user = tg.initDataUnsafe?.user || {};
    const userId = user.id || 123456;
    const username = user.first_name || '玩家';
    
    let currentRoom = null;
    
    async function createRoom() {
      console.log('🏠 创建房间');
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      
      try {
        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'create_multiplayer_room',
            user: { id: userId, username }
          })
        });
        
        const result = await response.json();
        console.log('创建房间结果:', result);
        
        if (result.success) {
          currentRoom = result;
          document.getElementById('loading').style.display = 'none';
          document.getElementById('create-room').style.display = 'block';
          document.getElementById('room-code').textContent = result.roomId;
          
          // 模拟玩家加入
          setTimeout(() => {
            document.getElementById('room-status').textContent = '等待玩家加入... 2/3';
          }, 3000);
          
          setTimeout(() => {
            document.getElementById('room-status').textContent = '房间已满！准备开始游戏...';
          }, 6000);
        } else {
          showError(result.error || '创建失败');
        }
      } catch (error) {
        console.error('创建房间失败:', error);
        showError(error.message || '网络错误');
      }
    }
    
    function showJoinRoom() {
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('join-room').style.display = 'block';
    }
    
    async function joinRoom() {
      const code = document.getElementById('join-code').value.toUpperCase();
      
      if (!code || code.length !== 6) {
        alert('请输入 6 位房间号');
        return;
      }
      
      document.getElementById('join-room').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      
      try {
        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'join_multiplayer_room',
            user: { id: userId, username },
            data: { roomId: code }
          })
        });
        
        const result = await response.json();
        console.log('加入房间结果:', result);
        
        if (result.success) {
          currentRoom = result;
          document.getElementById('loading').style.display = 'none';
          document.getElementById('create-room').style.display = 'block';
          document.getElementById('room-code').textContent = code;
          document.getElementById('room-status').textContent = `玩家：${result.player_count}/3`;
        } else {
          showError(result.error || '加入失败');
        }
      } catch (error) {
        console.error('加入房间失败:', error);
        showError(error.message || '网络错误');
      }
    }
    
    function showError(msg) {
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error-msg').textContent = msg;
    }
    
    function shareRoom() {
      if (currentRoom && currentRoom.roomId) {
        tg.shareUrl(`快来一起玩斗地主！房间号：${currentRoom.roomId}`);
      }
    }
  </script>
</body>
</html>
