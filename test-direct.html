<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>斗地主多人对战 - 直连版</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 { margin-bottom: 20px; }
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 0;
    }
    .btn-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }
    .status {
      margin: 20px 0;
      padding: 15px;
      border-radius: 10px;
      background: rgba(0,0,0,0.3);
    }
    .room-code {
      font-size: 32px;
      font-weight: bold;
      color: #ffd700;
      letter-spacing: 5px;
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎮 斗地主多人对战</h1>
    
    <div id="loading">
      <p>正在连接服务器...</p>
    </div>
    
    <div id="room" style="display:none;">
      <div class="status">
        <p>房间号</p>
        <div class="room-code" id="room-code">----</div>
        <p id="room-status">等待玩家加入... 1/3</p>
      </div>
      
      <button class="btn btn-success" onclick="shareRoom()">
        📤 分享房间
      </button>
    </div>
    
    <div id="error" style="display:none;">
      <div class="status" style="background:rgba(248,113,113,0.3);">
        <p style="color:#f87171;">❌ 连接失败</p>
        <p id="error-msg" style="margin-top:10px;font-size:14px;"></p>
      </div>
    </div>
  </div>
  
  <script>
    const API_ENDPOINT = 'https://period-zip-homepage-purchased.trycloudflare.com/api/bot-game';
    
    async function createRoom() {
      try {
        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'create_multiplayer_room',
            user: {
              id: window.Telegram.WebApp.initDataUnsafe?.user?.id || 123456,
              username: window.Telegram.WebApp.initDataUnsafe?.user?.first_name || '玩家'
            }
          })
        });
        
        const result = await response.json();
        console.log('创建房间结果:', result);
        
        if (result.success) {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('room').style.display = 'block';
          document.getElementById('room-code').textContent = result.roomId;
          
          // 模拟玩家加入
          setTimeout(() => {
            document.getElementById('room-status').textContent = '等待玩家加入... 2/3';
          }, 3000);
          
          setTimeout(() => {
            document.getElementById('room-status').textContent = '等待玩家加入... 3/3';
          }, 6000);
        } else {
          showError(result.error || '创建失败');
        }
      } catch (error) {
        console.error('创建房间失败:', error);
        showError(error.message || '网络错误');
      }
    }
    
    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('error-msg').textContent = msg;
    }
    
    function shareRoom() {
      const roomCode = document.getElementById('room-code').textContent;
      window.Telegram.WebApp.shareUrl(`快来一起玩斗地主！房间号：${roomCode}`);
    }
    
    // 页面加载时创建房间
    window.Telegram.WebApp.ready();
    window.Telegram.WebApp.expand();
    createRoom();
  </script>
</body>
</html>
