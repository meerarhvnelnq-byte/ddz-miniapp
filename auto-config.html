<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>斗地主 - 自动配置</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    h1 { margin-bottom: 20px; }
    .status {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
      font-size: 14px;
    }
    .loader {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin: 10px 0;
    }
    .btn-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: white;
    }
    .success { color: #4ade80; font-size: 18px; margin: 15px 0; }
    .error { color: #f87171; font-size: 14px; margin: 15px 0; }
    .api-url {
      font-family: monospace;
      background: rgba(0,0,0,0.3);
      padding: 10px;
      border-radius: 5px;
      word-break: break-all;
      margin: 10px 0;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔧 自动配置</h1>
    
    <div id="loading">
      <div class="loader"></div>
      <p>正在检测最新 API 地址...</p>
    </div>
    
    <div id="result" style="display:none;">
      <div class="status">
        <p>当前 API 地址：</p>
        <p class="api-url" id="api-url">加载中...</p>
      </div>
      
      <div id="test-status"></div>
      
      <button class="btn btn-success" id="start-btn" onclick="startGame()" style="display:none;">
        🎮 开始游戏
      </button>
      
      <button class="btn btn-secondary" onclick="retry()">🔄 重新检测</button>
    </div>
  </div>
  
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    // 可能的 API 地址列表
    const possibleApis = [
      'https://period-zip-homepage-purchased.trycloudflare.com/api/bot-game',
      'https://generates-tourism-sent-installed.trycloudflare.com/api/bot-game',
      'https://westminster-flows-construction-happened.trycloudflare.com/api/bot-game'
    ];
    
    let currentApi = null;
    
    async function detectApi() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result').style.display = 'none';
      
      // 先尝试 localStorage 中保存的地址
      const savedApi = localStorage.getItem('ddz_api_endpoint');
      if (savedApi) {
        console.log('尝试保存的地址:', savedApi);
        const success = await testApi(savedApi);
        if (success) {
          showResult(savedApi, true);
          return;
        }
      }
      
      // 依次测试可能的地址
      for (const api of possibleApis) {
        console.log('测试地址:', api);
        const success = await testApi(api);
        if (success) {
          showResult(api, true);
          return;
        }
      }
      
      // 所有地址都失败
      showResult(null, false);
    }
    
    async function testApi(apiUrl) {
      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'create_multiplayer_room',
            user: { id: tg.initDataUnsafe?.user?.id || 123456 }
          })
        });
        
        const result = await response.json();
        console.log('测试结果:', result);
        
        if (result.success) {
          currentApi = apiUrl;
          localStorage.setItem('ddz_api_endpoint', apiUrl);
          return true;
        }
      } catch (error) {
        console.log('测试失败:', error.message);
      }
      return false;
    }
    
    function showResult(api, success) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      
      const urlEl = document.getElementById('api-url');
      const testEl = document.getElementById('test-status');
      const startBtn = document.getElementById('start-btn');
      
      if (success && api) {
        urlEl.textContent = api;
        testEl.innerHTML = '<p class="success">✅ API 连接成功！</p>';
        startBtn.style.display = 'block';
      } else {
        urlEl.textContent = '未找到可用的 API 地址';
        testEl.innerHTML = '<p class="error">❌ 所有地址都无法连接<br><br>请运行命令获取最新地址：<br><code style="background:rgba(0,0,0,0.3);padding:5px;border-radius:5px;display:block;margin:10px 0;">journalctl -u cloudflared-tunnel --no-pager | grep trycloudflare.com | tail -1</code></p>';
        startBtn.style.display = 'none';
      }
    }
    
    function startGame() {
      // 跳转到主页面
      window.location.href = 'index.html';
    }
    
    function retry() {
      detectApi();
    }
    
    // 页面加载时自动检测
    detectApi();
  </script>
</body>
</html>
