<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>斗地主多人对战 - 简单版</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    .container {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 { margin-bottom: 30px; }
    .btn {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-success {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }
    .room-info {
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 10px;
      margin: 20px 0;
    }
    .room-code {
      font-size: 32px;
      font-weight: bold;
      color: #ffd700;
      letter-spacing: 5px;
      margin: 10px 0;
    }
    .status {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="title">🎮 斗地主多人对战</h1>
    
    <div id="lobby">
      <button class="btn btn-primary" onclick="createRoom()">
        🏠 创建房间
      </button>
      
      <button class="btn btn-success" onclick="showJoinRoom()">
        🚪 加入房间
      </button>
    </div>
    
    <div id="create-room" style="display:none;">
      <div class="room-info">
        <p>房间号</p>
        <div class="room-code" id="room-code">A1B2C3</div>
        <p class="status" id="room-status">等待玩家加入... 1/3</p>
      </div>
      
      <button class="btn btn-success" onclick="shareRoom()">
        📤 分享房间
      </button>
      
      <button class="btn btn-primary" onclick="startGame()" id="start-btn" disabled style="opacity:0.5;">
        🎮 开始游戏
      </button>
    </div>
    
    <div id="join-room" style="display:none;">
      <input type="text" id="join-code" maxlength="6" placeholder="输入 6 位房间号" 
             style="width:100%;padding:15px;font-size:20px;text-align:center;letter-spacing:3px;border:2px solid rgba(255,255,255,0.3);border-radius:10px;background:rgba(0,0,0,0.3);color:white;margin:20px 0;" />
      
      <button class="btn btn-success" onclick="joinRoom()">
        🚪 加入房间
      </button>
    </div>
  </div>
  
  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    
    const user = tg.initDataUnsafe?.user || {};
    const userId = user.id || 123456;
    const username = user.first_name || '玩家';
    
    let currentRoom = null;
    
    function createRoom() {
      // 生成随机房间号
      const roomCode = generateRoomCode();
      currentRoom = {
        id: roomCode,
        owner: userId,
        players: [userId],
        status: 'waiting'
      };
      
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('create-room').style.display = 'block';
      document.getElementById('room-code').textContent = roomCode;
      
      // 模拟玩家加入
      setTimeout(() => {
        document.getElementById('room-status').textContent = '等待玩家加入... 2/3';
      }, 2000);
      
      setTimeout(() => {
        document.getElementById('room-status').textContent = '等待玩家加入... 3/3';
        document.getElementById('start-btn').disabled = false;
        document.getElementById('start-btn').style.opacity = '1';
      }, 4000);
    }
    
    function showJoinRoom() {
      document.getElementById('lobby').style.display = 'none';
      document.getElementById('join-room').style.display = 'block';
    }
    
    function joinRoom() {
      const code = document.getElementById('join-code').value.toUpperCase();
      if (code.length !== 6) {
        alert('请输入 6 位房间号');
        return;
      }
      
      currentRoom = {
        id: code,
        owner: 0,
        players: [userId],
        status: 'waiting'
      };
      
      document.getElementById('join-room').style.display = 'none';
      document.getElementById('create-room').style.display = 'block';
      document.getElementById('room-code').textContent = code;
      document.getElementById('room-status').textContent = '等待玩家加入... 1/3';
      
      // 模拟玩家加入
      setTimeout(() => {
        document.getElementById('room-status').textContent = '等待玩家加入... 2/3';
      }, 2000);
      
      setTimeout(() => {
        document.getElementById('room-status').textContent = '等待玩家加入... 3/3';
        document.getElementById('start-btn').disabled = false;
        document.getElementById('start-btn').style.opacity = '1';
      }, 4000);
    }
    
    function shareRoom() {
      const text = `快来一起玩斗地主！房间号：${currentRoom.id}`;
      tg.shareUrl(text);
    }
    
    function startGame() {
      alert('游戏开始！\n房间号：' + currentRoom.id);
      // TODO: 跳转到游戏界面
    }
    
    function generateRoomCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 6; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return code;
    }
  </script>
</body>
</html>
